services:
  - type: web
    name: desale-backend
    runtime: node
    rootDir: desale-backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    plan: free
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
