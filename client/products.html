<script>
function logout() {
  localStorage.removeItem("loggedInUser");
  window.location.href = "login.html";
}
</script>

<script>
function toggleTheme() {
  document.body.classList.toggle("dark");

  if (document.body.classList.contains("dark")) {
    localStorage.setItem("theme", "dark");
  } else {
    localStorage.setItem("theme", "light");
  }
}

// Apply saved theme on load
document.addEventListener("DOMContentLoaded", function () {
  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
  }
});
</script>
<script>
function rate(el, value) {
  const stars = el.parentElement.querySelectorAll("span");
  const product = el.parentElement.dataset.product;

  stars.forEach((star, index) => {
    star.classList.toggle("active", index < value);
  });

  localStorage.setItem("rating_" + product, value);
}

// Load saved ratings
document.querySelectorAll(".rating").forEach(r => {
  const product = r.dataset.product;
  const saved = localStorage.getItem("rating_" + product);
  if (saved) {
    r.querySelectorAll("span").forEach((s,i)=>{
      s.classList.toggle("active", i < saved);
    });
  }
});
</script>

<script>
function addToCart(name, price, image) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  // Check if product already exists
  let existingProduct = cart.find(item => item.name === name);

  if (existingProduct) {
    existingProduct.qty += 1;
  } else {
    cart.push({
      name: name,
      price: price,
      image: image,
      qty: 1
    });
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  alert(name + " added to cart");
}
</script>
